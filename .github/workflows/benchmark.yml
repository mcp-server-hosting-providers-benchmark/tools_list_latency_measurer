name: tools_list_benchmark

on:
  schedule:
    - cron: "0 */2 * * *"   # toutes les 2h
  workflow_dispatch:          # déclenchement manuel

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run benchmark
        run: node tools_list_measurement.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: results/
          retention-days: 90
